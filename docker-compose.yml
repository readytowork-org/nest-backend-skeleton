version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: ./docker/web.Dockerfile
    ports:
      - ${PORT}:${PORT}
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    env_file: .env
    container_name: nest-backend-starter
    depends_on:
      - database
    networks:
      - nestbackend-network

  database:
    build:
      context: .
      dockerfile: ./docker/db.Dockerfile
    environment:
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    container_name: nest-db-starter
    env_file:
      - .env
    command:
      [
        "--character-set-server=utf8mb4",
        "--collation-server=utf8mb4_unicode_ci",
        "--default-authentication-plugin=mysql_native_password",
      ]
    ports:
      - ${DB_PORT}:3306
    volumes:
      - nest_db:/var/lib/mysql
    networks:
      - nestbackend-network

  adminer:
    image: adminer
    ports:
      - ${ADMINER_PORT}:8080
    networks:
      - nestbackend-network

volumes:
  nest_db:

networks:
  nestbackend-network:
